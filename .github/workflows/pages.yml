name: Deploy to GitHub Pages

# This workflow builds the static site and deploys it to GitHub Pages on every
# push to main, and on manual trigger. The site has no build step — the
# artifact is the repo contents as-is.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for any local checks / future use)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify the data file is valid JSON
        run: python3 -c "import json; json.load(open('data/rulings.json'))"
        shell: bash

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The site is the repo root — no build step.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
